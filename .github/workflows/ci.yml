name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Compile Python modules
        run: |
          python -m compileall \
            answer_mosa_rag_jsonl.py \
            evaluate_mosa_rag_jsonl.py \
            retrieve_mosa_rag_jsonl.py \
            serve_mosa_rag.py \
            server.py \
            mosa_rag

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chat-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: chat-ui
        run: npm ci

      - name: Lint frontend
        working-directory: chat-ui
        run: npm run lint

      - name: Build frontend
        working-directory: chat-ui
        run: npm run build
